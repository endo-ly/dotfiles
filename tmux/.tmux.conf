# ==========================================
# Tmux Configuration
# ==========================================

# ------------------------------------------
# 0. Cheat Sheet (Prefix: Ctrl+b)
# ------------------------------------------
# [Session]
#   tmux new -s <name>   : 新しいセッションを作成
#   tmux a -t <name>     : セッションにアタッチ
#   tmux ls              : セッション一覧を表示
#   prefix + d           : セッションからデタッチ (バックグラウンドへ)
#   prefix + s           : セッション一覧選択ツリー
#
# [Window] (タブのようなもの)
#   prefix + c           : 新規ウィンドウ作成
#   prefix + n / p       : 次/前のウィンドウへ移動
#   prefix + <number>    : 指定番号のウィンドウへ移動
#   prefix + ,           : ウィンドウの名前変更
#   prefix + w           : ウィンドウ一覧選択
#
# [Pane] (画面分割)
#   prefix + %           : 左右に分割
#   prefix + "           : 上下に分割
#   prefix + o           : ペイン間を移動
#   prefix + z           : 現在のペインを最大化/復帰 (Zoom)
#   prefix + x           : ペインを閉じる
#
# [Copy Mode] (Vi Style)
#   prefix + [           : コピーモード開始 (スクロール可能に)
#   v                    : 選択開始 (Visual mode)
#   y                    : コピー (Yank)
#   prefix + ]           : 貼り付け (Paste)
#   /                    : 検索 (Vi同様 n/N で次/前)

# インデックスを1から開始 (キーボードの配置的に 0 より 1 のほうが押しやすいため)
set -g base-index 1
setw -g pane-base-index 1

# 履歴の制限を増やす (デフォルトは2000行程度)
set -g history-limit 10000

# マウス操作を有効化
# (画面分割の境界線ドラッグ、スクロール、クリックでのペイン選択が可能)
set -g mouse on

# 標準の256色モードを使用
set -g default-terminal "screen-256color"

# 設定ファイルの再読み込み: prefix + r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# コピーモードの操作をViライクにする
set-window-option -g mode-keys vi

# 'v' で選択開始 (Visual modeのように)
bind-key -T copy-mode-vi v send-keys -X begin-selection

# 'y' でコピー (Yankのように)
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel